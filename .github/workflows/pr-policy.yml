name: PR policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  naming-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|test|hotfix)(\([a-z0-9-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits."
            exit 1
          fi

      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|test|hotfix)/[A-Z]+-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$'
          if [[ ! "$BRANCH" =~ $pattern ]]; then
            echo "Branch must match type/TASK-123-short-description."
            exit 1
          fi

