# Fly.io 배포 설정. Dockerfile(standalone Next 서버) 기반.
# app 이름은 전역 유일해야 한다 — 중복 시 변경한다.
app = "business-os-kmong"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
